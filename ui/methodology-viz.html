<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Methodology Map</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══ Design System: HUD / Sci-Fi FUI + Cyberpunk ═══
     --bg: #0A0A0F (void)
     --card: #12121A
     --accent: #00FFFF (neon cyan) / #00FF88 (green) / #FF00FF (magenta)
     --border: #1A1A2E
     --font-heading: Orbitron
     --font-body: JetBrains Mono
     Thin 1px lines, chamfered corners, neon glow, scanlines
  */
  :root {
    --void: #0A0A0F;
    --card: #0D0D18;
    --cyan: #00FFFF;
    --cyan-mid: #00BBDD;
    --cyan-dim: #005566;
    --cyan-glow: rgba(0, 255, 255, 0.4);
    --cyan-subtle: rgba(0, 255, 255, 0.08);
    --green: #00FF88;
    --magenta: #FF00FF;
    --amber: #FFB800;
    --red: #FF3366;
    --blue: #0080FF;
    --border: rgba(0, 255, 255, 0.12);
    --border-bright: rgba(0, 255, 255, 0.35);
    --text: #C0E8FF;
    --text-dim: #2A4060;
    --text-bright: #E8F8FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }

  #graph-canvas {
    position: absolute; inset: 0;
  }

  /* ═══ Scanlines ═══════════════════════════════════════ */
  #scanlines {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 10;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 1px,
      rgba(0,255,255,0.012) 1px, rgba(0,255,255,0.012) 2px
    );
  }

  /* ═══ CRT vignette ═══════════════════════════════════════ */
  #vignette {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9;
    background: radial-gradient(ellipse 65% 65% at 50% 50%, transparent 30%, rgba(10,10,15,0.85) 100%);
  }

  /* ═══ Arc Reactor (center glow) ════════════════════════ */
  #arc-reactor {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 2;
  }
  #arc-reactor .core {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow:
      0 0 4px var(--cyan),
      0 0 15px var(--cyan),
      0 0 60px var(--cyan-glow),
      0 0 150px rgba(0,255,255,0.08);
    animation: core-pulse 3s ease-in-out infinite;
  }
  @keyframes core-pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.8); }
  }

  /* ═══ HUD Rings (rotating) ════════════════════════════ */
  .hud-ring {
    position: fixed;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1px solid;
    pointer-events: none; z-index: 2;
  }
  .ring-1 {
    width: 200px; height: 200px;
    margin: -100px 0 0 -100px;
    border-color: rgba(0,255,255,0.12);
    animation: spin-cw 40s linear infinite;
  }
  .ring-2 {
    width: 380px; height: 380px;
    margin: -190px 0 0 -190px;
    border-color: rgba(0,255,255,0.06);
    border-style: dashed;
    animation: spin-ccw 70s linear infinite;
  }
  .ring-3 {
    width: 580px; height: 580px;
    margin: -290px 0 0 -290px;
    border-color: rgba(0,128,255,0.04);
    border-style: dotted;
    animation: spin-cw 100s linear infinite;
  }
  /* Ring tick marks */
  .ring-1::before, .ring-1::after,
  .ring-2::before, .ring-2::after {
    content: '';
    position: absolute;
    background: rgba(0,255,255,0.25);
  }
  .ring-1::before { width: 20px; height: 1px; top: -1px; left: 50%; transform: translateX(-50%); }
  .ring-1::after  { width: 1px; height: 20px; left: -1px; top: 50%; transform: translateY(-50%); }
  .ring-2::before { width: 30px; height: 1px; top: -1px; left: 50%; transform: translateX(-50%); }
  .ring-2::after  { width: 1px; height: 30px; right: -1px; top: 50%; transform: translateY(-50%); }

  @keyframes spin-cw  { to { transform: rotate(360deg); } }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }

  /* ═══ HUD Panel base ══════════════════════════════════ */
  .hud-panel {
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    position: relative;
    /* Chamfered corners via clip-path */
    clip-path: polygon(
      12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
      calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px
    );
  }

  /* HUD corner brackets overlay */
  .hud-brackets::before, .hud-brackets::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    pointer-events: none;
  }
  .hud-brackets::before {
    top: 2px; left: 2px;
    border-top: 1px solid var(--cyan);
    border-left: 1px solid var(--cyan);
    opacity: 0.5;
  }
  .hud-brackets::after {
    bottom: 2px; right: 2px;
    border-bottom: 1px solid var(--cyan);
    border-right: 1px solid var(--cyan);
    opacity: 0.5;
  }

  /* ═══ Info panel (top-left) ═══════════════════════════ */
  #info-panel {
    position: fixed;
    top: 24px; left: 24px;
    width: 280px;
    padding: 22px 24px 18px;
    z-index: 100;
  }

  .panel-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(0,255,255,0.08);
  }
  .reactor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan), 0 0 15px var(--cyan-glow);
    animation: dot-blink 2s ease-in-out infinite;
  }
  @keyframes dot-blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 15px var(--cyan-glow);
  }
  .panel-subtitle {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .stat-row + .stat-row { border-top: 1px solid rgba(0,255,255,0.04); }
  .stat-row .val {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan-glow);
  }

  /* ═══ Status bar ══════════════════════════════════════ */
  #status-bar {
    position: fixed;
    bottom: 24px; left: 24px;
    padding: 10px 18px;
    z-index: 100;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center; gap: 10px;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 4px var(--green), 0 0 10px rgba(0,255,136,0.3);
    animation: dot-blink 2s ease-in-out infinite;
  }

  /* ═══ Detail panel (right) ═══════════════════════════ */
  #detail-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 200;
    overflow-y: auto;
    padding: 28px 24px;
  }
  #detail-panel.open { transform: translateX(0); }
  #detail-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.5;
  }

  .close-btn {
    position: absolute; top: 14px; right: 16px;
    background: none; border: 1px solid var(--border);
    width: 26px; height: 26px;
    color: var(--text-dim); font-size: 14px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .close-btn:hover {
    color: var(--cyan);
    border-color: var(--border-bright);
    box-shadow: 0 0 10px var(--cyan-glow);
  }

  .node-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 7px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid;
    margin-bottom: 14px;
  }

  #detail-panel h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
    padding-right: 30px;
    line-height: 1.4;
  }
  .domain-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px; font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0,255,255,0.06);
  }
  .section-title::before { content: '// '; color: rgba(0,255,255,0.2); }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .metric-card {
    background: var(--cyan-subtle);
    border: 1px solid var(--border);
    padding: 10px 12px;
  }
  .metric-label {
    font-size: 7px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .metric-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan-glow);
  }
  .metric-unit { font-size: 8px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .conf-bar-bg {
    height: 2px;
    background: rgba(0,255,255,0.08);
    margin: 6px 0 18px;
    overflow: hidden;
  }
  .conf-bar-fill {
    height: 100%;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .bs-card {
    background: rgba(255,51,102,0.04);
    border: 1px solid rgba(255,51,102,0.12);
    padding: 12px; margin-bottom: 8px;
  }
  .bs-sev {
    font-family: 'Orbitron', sans-serif;
    font-size: 7px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .bs-sev.high   { color: var(--red); text-shadow: 0 0 6px rgba(255,51,102,0.3); }
  .bs-sev.medium { color: var(--amber); }
  .bs-desc { font-size: 10px; color: #5a7090; margin-bottom: 6px; line-height: 1.5; }
  .bs-sug {
    font-size: 9px; color: var(--cyan);
    padding: 6px 8px;
    background: var(--cyan-subtle);
    border-left: 2px solid var(--cyan);
  }

  /* ═══ Tooltip ═════════════════════════════════════════ */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10,10,15,0.94);
    border: 1px solid var(--border-bright);
    padding: 10px 14px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 240px;
    backdrop-filter: blur(16px);
  }
  #tooltip.visible { opacity: 1; }
  .tt-label { font-family: 'Orbitron'; font-size: 9px; font-weight: 600; color: var(--text-bright); margin-bottom: 3px; }
  .tt-type { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .tt-meta { font-size: 9px; color: var(--text-dim); line-height: 1.6; white-space: pre-line; }

  /* ═══ Legend ═══════════════════════════════════════════ */
  #legend {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 20px;
    padding: 10px 20px;
    z-index: 100;
    background: rgba(10,10,15,0.8);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .leg-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 8px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .leg-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ═══ Reset ═══════════════════════════════════════════ */
  #reset-btn {
    position: fixed; top: 24px; right: 24px;
    background: rgba(10,10,15,0.8);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 8px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer; z-index: 150;
    transition: all 0.3s;
    backdrop-filter: blur(12px);
  }
  #reset-btn:hover {
    border-color: var(--border-bright);
    box-shadow: 0 0 20px var(--cyan-glow);
    text-shadow: 0 0 8px var(--cyan-glow);
  }

  /* ═══ Loading ═════════════════════════════════════════ */
  #loading {
    position: fixed; inset: 0;
    background: var(--void);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500;
    transition: opacity 1s;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,255,0.1);
    border-top-color: var(--cyan);
    animation: spin-cw 1s linear infinite;
    margin-bottom: 20px;
    box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 15px rgba(0,255,255,0.03);
    position: relative;
  }
  .loader-ring::after {
    content: '';
    position: absolute; inset: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,255,0.06);
    border-bottom-color: rgba(255,0,255,0.3);
    animation: spin-ccw 1.8s linear infinite;
  }
  .loader-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-glow);
    animation: flicker 2.5s ease-in-out infinite;
  }
  .loader-sub {
    font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
    margin-top: 8px;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* scrollbar */
  #detail-panel::-webkit-scrollbar { width: 3px; }
  #detail-panel::-webkit-scrollbar-track { background: transparent; }
  #detail-panel::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.12); }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-title">J.A.R.V.I.S.</div>
  <div class="loader-sub">Initializing cognitive map</div>
</div>

<div id="scanlines"></div>
<div id="vignette"></div>
<div id="arc-reactor"><div class="core"></div></div>
<div class="hud-ring ring-1"></div>
<div class="hud-ring ring-2"></div>
<div class="hud-ring ring-3"></div>
<div id="graph-canvas"></div>

<div id="info-panel" class="hud-panel">
  <div class="panel-header">
    <div class="reactor-dot"></div>
    <div>
      <div class="panel-title">J.A.R.V.I.S.</div>
      <div class="panel-subtitle">Methodology Intelligence</div>
    </div>
  </div>
  <div class="stat-row"><span>Domains</span><span class="val" id="s-dom">--</span></div>
  <div class="stat-row"><span>Entry Points</span><span class="val" id="s-ent">--</span></div>
  <div class="stat-row"><span>Patterns</span><span class="val" id="s-pat">--</span></div>
  <div class="stat-row"><span>Tools</span><span class="val" id="s-tool">--</span></div>
  <div class="stat-row"><span>Blind Spots</span><span class="val" id="s-bs">--</span></div>
  <div class="stat-row"><span>Synapses</span><span class="val" id="s-edge">--</span></div>
</div>

<div id="status-bar" class="hud-panel">
  <div class="status-dot"></div>
  <span id="status-text">Initializing</span>
  <span style="color:var(--cyan-dim)">|</span>
  <span id="status-time"></span>
</div>

<button id="reset-btn">Reset</button>

<div id="detail-panel">
  <button class="close-btn" id="close-detail">&#x2715;</button>
  <div id="detail-content"></div>
</div>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#00FFFF;box-shadow:0 0 6px #00FFFF"></div>Domain</div>
  <div class="leg-item"><div class="leg-dot" style="background:#00FF88;box-shadow:0 0 6px #00FF88"></div>Entry</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0080FF;box-shadow:0 0 6px #0080FF"></div>Pattern</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FFB800;box-shadow:0 0 6px #FFB800"></div>Tool</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FF00FF;box-shadow:0 0 6px #FF00FF"></div>Bridge</div>
  <div class="leg-item"><div class="leg-dot" style="background:#333;box-shadow:0 0 4px #333"></div>Blind Spot</div>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════ */
const SERVER_URL = 'http://localhost:3456/graph';

const COLORS = {
  'domain':            '#00FFFF',
  'entry-point':       '#00FF88',
  'recurring-pattern': '#0080FF',
  'tool-preference':   '#FFB800',
  'blind-spot':        '#333344',
  'bridge':            '#FF00FF',
};
const LABELS = {
  'domain': 'Domain Hub', 'entry-point': 'Entry Point',
  'recurring-pattern': 'Pattern', 'tool-preference': 'Tool Pref',
  'blind-spot': 'Blind Spot',
};

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let graphData = null, graph = null, selectedId = null, focused = false;
const mouse = { x: 0, y: 0 };

/* ═══════════════════════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════════════════════ */
setInterval(() => {
  const d = new Date();
  document.getElementById('status-time').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
}, 1000);

/* ═══════════════════════════════════════════════════════════════
   DATA LOADING + FILTERING
   Key fix: filter to top 12 domains by session count.
   This prevents the 1582-node blob.
═══════════════════════════════════════════════════════════════ */
async function loadData() {
  try {
    const res = await fetch(SERVER_URL, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('[jarvis] Fallback sample data:', e.message);
    return SAMPLE;
  }
}

function filterData(raw) {
  const nodes = raw.nodes || [];
  const edges = raw.edges || [];
  const bs = raw.blindSpotRegions || [];

  // Find domain hubs and keep only top N by sessionCount
  const MAX_DOMAINS = 12;
  const domainNodes = nodes.filter(n => n.type === 'domain')
    .sort((a, b) => (b.sessionCount || 0) - (a.sessionCount || 0))
    .slice(0, MAX_DOMAINS);
  const keepDomains = new Set(domainNodes.map(n => n.domain));
  const keepDomainIds = new Set(domainNodes.map(n => n.id));

  // Keep child nodes only for kept domains, limit per type per domain
  const MAX_ENTRIES = 3, MAX_PATTERNS = 5, MAX_TOOLS = 4;
  const countPerDomain = {};
  const filteredNodes = [...domainNodes];

  for (const n of nodes) {
    if (n.type === 'domain') continue;
    if (!keepDomains.has(n.domain)) continue;
    const key = `${n.domain}:${n.type}`;
    countPerDomain[key] = (countPerDomain[key] || 0) + 1;
    const limit = n.type === 'entry-point' ? MAX_ENTRIES
                : n.type === 'recurring-pattern' ? MAX_PATTERNS
                : n.type === 'tool-preference' ? MAX_TOOLS : 3;
    if (countPerDomain[key] <= limit) filteredNodes.push(n);
  }

  const keepIds = new Set(filteredNodes.map(n => n.id));
  const filteredEdges = edges.filter(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    return keepIds.has(s) && keepIds.has(t);
  });

  // Add blind spot nodes for kept domains (max 2 per domain)
  const bsCount = {};
  const bsNodes = [];
  const bsEdges = [];
  for (const b of bs) {
    if (!keepDomains.has(b.domain)) continue;
    bsCount[b.domain] = (bsCount[b.domain] || 0) + 1;
    if (bsCount[b.domain] > 2) continue;
    const id = `bs_${bsNodes.length}`;
    bsNodes.push({
      id, type: 'blind-spot', label: b.value, domain: b.domain,
      confidence: 0.1, severity: b.severity,
      description: b.description, suggestion: b.suggestion,
      color: '#333344', size: 3, _bs: true,
    });
    const hub = domainNodes.find(n => n.domain === b.domain);
    if (hub) bsEdges.push({ source: hub.id, target: id, type: 'has-blindspot', weight: 0.08 });
  }

  return {
    nodes: [...filteredNodes, ...bsNodes],
    edges: [...filteredEdges, ...bsEdges],
    blindSpotRegions: bs.filter(b => keepDomains.has(b.domain)),
  };
}

/* ═══════════════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════════════ */
function updateStats(d) {
  const c = {};
  d.nodes.forEach(n => c[n.type] = (c[n.type]||0) + 1);
  document.getElementById('s-dom').textContent  = c['domain'] || 0;
  document.getElementById('s-ent').textContent  = c['entry-point'] || 0;
  document.getElementById('s-pat').textContent  = c['recurring-pattern'] || 0;
  document.getElementById('s-tool').textContent = c['tool-preference'] || 0;
  document.getElementById('s-bs').textContent   = c['blind-spot'] || 0;
  document.getElementById('s-edge').textContent = d.edges.length;
}

/* ═══════════════════════════════════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════════════════════════════════ */
function openDetail(node) {
  const col = COLORS[node.type] || '#00FFFF';
  let h = `<div class="node-badge" style="background:${col}10;border-color:${col}40;color:${col}">
    <span style="width:5px;height:5px;border-radius:50%;background:${col};display:inline-block;box-shadow:0 0 6px ${col}"></span>
    ${LABELS[node.type] || node.type}
  </div>
  <h2>${node.label}</h2>
  <div class="domain-label">${node.domain || ''}</div>`;

  const m = [];
  if (node.sessionCount != null) m.push(['Sessions', node.sessionCount, '']);
  if (node.frequency != null)    m.push(['Freq', node.frequency, 'x']);
  if (node.confidence != null && !node._bs) m.push(['Conf', Math.round(node.confidence*100), '%']);
  if (node.ratio != null)        m.push(['Usage', Math.round(node.ratio*100), '%']);
  if (node.avgPerSession != null) m.push(['Avg/Sess', node.avgPerSession, '']);

  if (m.length) {
    h += `<div class="section-title">Metrics</div><div class="metric-grid">${m.map(([l,v,u]) =>
      `<div class="metric-card"><div class="metric-label">${l}</div><div class="metric-val">${v}<span class="metric-unit">${u}</span></div></div>`
    ).join('')}</div>`;
  }

  if (node.confidence != null && !node._bs) {
    const pct = Math.round(node.confidence * 100);
    h += `<div style="display:flex;justify-content:space-between;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase">
      <span>Confidence</span><span style="color:${col};font-family:Orbitron">${pct}%</span></div>
    <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${pct}%;background:${col};box-shadow:0 0 8px ${col}40"></div></div>`;
  }

  if (node._bs) {
    h += `<div class="section-title">Analysis</div>
    <div class="bs-card"><div class="bs-sev ${node.severity}">${node.severity}</div>
    <div class="bs-desc">${node.description}</div>
    <div class="bs-sug">${node.suggestion}</div></div>`;
  }

  if (node.type === 'domain' && graphData) {
    const dbs = graphData.blindSpotRegions.filter(b => b.domain === node.domain).slice(0, 5);
    if (dbs.length) {
      h += `<div class="section-title">Blind Spots (${dbs.length})</div>${dbs.map(b =>
        `<div class="bs-card"><div class="bs-sev ${b.severity}">${b.severity}</div>
        <div class="bs-desc">${b.description}</div>
        <div class="bs-sug">${b.suggestion}</div></div>`).join('')}`;
    }
  }

  document.getElementById('detail-content').innerHTML = h;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null; focused = false;
  if (graph) graph.nodeOpacity(() => 1);
}

/* ═══════════════════════════════════════════════════════════════
   FOCUS
═══════════════════════════════════════════════════════════════ */
function getConnected(id) {
  const s = new Set([id]);
  graphData.edges.forEach(e => {
    const a = typeof e.source === 'object' ? e.source.id : e.source;
    const b = typeof e.target === 'object' ? e.target.id : e.target;
    if (a === id) s.add(b); if (b === id) s.add(a);
  });
  return s;
}

/* ═══════════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════════ */
const tip = document.getElementById('tooltip');
function showTip(n, x, y) {
  document.getElementById('tt-label').textContent = n.label;
  document.getElementById('tt-type').textContent = LABELS[n.type] || n.type;
  document.getElementById('tt-type').style.color = COLORS[n.type] || '#00FFFF';
  let meta = '';
  if (n.sessionCount != null) meta += `Sessions: ${n.sessionCount}\n`;
  if (n.frequency != null) meta += `Freq: ${n.frequency}\n`;
  if (n.confidence != null) meta += `Conf: ${Math.round(n.confidence*100)}%\n`;
  if (n.ratio != null) meta += `Usage: ${Math.round(n.ratio*100)}%\n`;
  document.getElementById('tt-meta').textContent = meta.trim();
  let tx = x + 16, ty = y + 16;
  if (tx + 240 > innerWidth) tx = x - 256;
  if (ty + 100 > innerHeight) ty = y - 116;
  tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
  tip.classList.add('visible');
}

/* ═══════════════════════════════════════════════════════════════
   TEXT TEXTURE — Orbitron, neon cyan glow, underline
═══════════════════════════════════════════════════════════════ */
function makeLabel(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const x = c.getContext('2d');
  x.clearRect(0, 0, 512, 128);
  x.font = '700 26px Orbitron, sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  // glow
  x.shadowColor = '#00FFFF'; x.shadowBlur = 20;
  x.fillStyle = '#00FFFF'; x.fillText(text.toUpperCase(), 256, 58);
  // crisp
  x.shadowBlur = 0;
  x.fillStyle = '#E8F8FF'; x.fillText(text.toUpperCase(), 256, 58);
  // underline
  const w = x.measureText(text.toUpperCase()).width;
  x.strokeStyle = 'rgba(0,255,255,0.25)'; x.lineWidth = 1;
  x.beginPath(); x.moveTo(256-w/2, 78); x.lineTo(256+w/2, 78); x.stroke();
  return new THREE.CanvasTexture(c);
}

/* ═══════════════════════════════════════════════════════════════
   CUSTOM NODE MESHES — Glow spheres with emissive material
═══════════════════════════════════════════════════════════════ */
function createGlowSphere(color, size) {
  const hex = parseInt(color.replace('#',''), 16);
  // Inner bright core
  const inner = new THREE.Mesh(
    new THREE.SphereGeometry(size * 0.4, 16, 16),
    new THREE.MeshBasicMaterial({ color: hex, transparent: true, opacity: 0.95 })
  );
  // Outer glow shell
  const outer = new THREE.Mesh(
    new THREE.SphereGeometry(size * 0.8, 16, 16),
    new THREE.MeshBasicMaterial({ color: hex, transparent: true, opacity: 0.12 })
  );
  const group = new THREE.Group();
  group.add(inner);
  group.add(outer);
  return group;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD GRAPH — core rendering
═══════════════════════════════════════════════════════════════ */
function build(data) {
  graphData = data;
  const fgData = {
    nodes: data.nodes.map(n => ({ ...n })),
    links: data.edges.map(e => ({ ...e })),
  };

  graph = ForceGraph3D({ controlType: 'orbit' })(document.getElementById('graph-canvas'))
    .width(innerWidth).height(innerHeight)
    .backgroundColor('#0A0A0F')
    .showNavInfo(false)
    .graphData(fgData)
    .nodeId('id')
    .nodeLabel(() => '')
    .nodeOpacity(1)
    // Custom THREE objects for every node — glow spheres + domain labels
    .nodeThreeObject(node => {
      const col = COLORS[node.type] || '#00FFFF';
      const sz = node.type === 'domain'
        ? Math.max(3, Math.min(8, Math.sqrt(node.sessionCount || 1) * 1.2))
        : Math.max(1.5, Math.min(4, (node.size || 4) * 0.3));

      const group = createGlowSphere(col, sz);

      // Domain hub gets a text label
      if (node.type === 'domain') {
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
          map: makeLabel(node.label),
          transparent: true, depthWrite: false,
        }));
        sprite.scale.set(sz * 14, sz * 3.5, 1);
        sprite.position.set(0, sz * 1.8, 0);
        group.add(sprite);
      }

      return group;
    })
    .nodeThreeObjectExtend(false) // replace default sphere entirely
    // Links
    .linkColor(l => {
      if (l.type === 'bridge') return '#FF00FF';
      if (l.type === 'has-blindspot') return 'rgba(50,50,68,0.2)';
      return `rgba(0,255,255,${0.04 + (l.weight||0.5) * 0.12})`;
    })
    .linkWidth(l => l.type === 'bridge' ? 1.5 : l.type === 'has-blindspot' ? 0.2 : 0.15 + (l.weight||0.5) * 0.8)
    .linkOpacity(0.8)
    .linkCurvature(l => l.type === 'bridge' ? 0.4 : 0.05)
    .linkDirectionalParticles(l => l.type === 'bridge' ? 5 : l.type === 'has-blindspot' ? 0 : (l.weight||0) > 0.5 ? 2 : 1)
    .linkDirectionalParticleColor(l => l.type === 'bridge' ? '#FF00FF' : '#00FFFF')
    .linkDirectionalParticleWidth(l => l.type === 'bridge' ? 1.5 : 0.8)
    .linkDirectionalParticleSpeed(l => l.type === 'bridge' ? 0.005 : 0.003)
    // Interactions
    .onNodeClick((n, ev) => {
      ev.stopPropagation();
      if (selectedId === n.id) { closeDetail(); return; }
      selectedId = n.id; focused = true;
      const conn = getConnected(n.id);
      graph.nodeOpacity(x => conn.has(x.id) ? 1 : 0.05);
      openDetail(n);
      const dist = 80;
      const r = 1 + dist / Math.hypot(n.x||1, n.y||1, n.z||1);
      graph.cameraPosition(
        { x: (n.x||0)*r, y: (n.y||0)*r, z: (n.z||0)*r },
        { x: n.x||0, y: n.y||0, z: n.z||0 }, 1200
      );
    })
    .onNodeHover(n => {
      document.body.style.cursor = n ? 'pointer' : 'default';
      n ? showTip(n, mouse.x, mouse.y) : tip.classList.remove('visible');
    })
    .onBackgroundClick(() => closeDetail());

  // ═══ FORCE TUNING — spread nodes far apart ═══
  // Much stronger repulsion to avoid the blob
  graph.d3Force('charge').strength(n =>
    n.type === 'domain' ? -800 : -120
  ).distanceMax(500);

  graph.d3Force('link')
    .distance(l => {
      if (l.type === 'bridge') return 300;
      if (l.type === 'has-entry') return 80;
      if (l.type === 'has-pattern') return 100;
      if (l.type === 'uses-tool') return 90;
      if (l.type === 'has-blindspot') return 120;
      return 80;
    })
    .strength(l => l.type === 'bridge' ? 0.05 : 0.3);

  // Center force weaker so domains spread
  graph.d3Force('center').strength(0.02);

  updateStats(data);
}

/* ═══════════════════════════════════════════════════════════════
   POST-PROCESSING — fog, ambient light, tone mapping
═══════════════════════════════════════════════════════════════ */
function setupScene() {
  setTimeout(() => {
    try {
      const r = graph.renderer();
      r.toneMapping = THREE.ACESFilmicToneMapping;
      r.toneMappingExposure = 1.6;

      const scene = graph.scene();
      scene.fog = new THREE.FogExp2(0x0A0A0F, 0.0006);
      scene.add(new THREE.AmbientLight(0x00FFFF, 0.015));

      // Point light at center for reactor glow
      const pt = new THREE.PointLight(0x00FFFF, 0.3, 400);
      pt.position.set(0, 0, 0);
      scene.add(pt);
    } catch (e) {}
  }, 600);
}

/* ═══════════════════════════════════════════════════════════════
   SEMANTIC ZOOM
═══════════════════════════════════════════════════════════════ */
function setupZoom() {
  let last = null;
  setInterval(() => {
    if (!graph) return;
    try {
      const d = graph.camera().position.length();
      if (last && Math.abs(d - last) < 5) return;
      last = d;
      if (!focused) {
        graph.nodeOpacity(n => {
          if (d > 500 && n.type !== 'domain') return 0.25;
          if (d > 350 && n.type === 'blind-spot') return 0.15;
          return 1;
        });
      }
    } catch (e) {}
  }, 200);
}

/* ═══════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════ */
addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (tip.classList.contains('visible')) {
    let tx = e.clientX + 16, ty = e.clientY + 16;
    if (tx + 240 > innerWidth) tx = e.clientX - 256;
    if (ty + 100 > innerHeight) ty = e.clientY - 116;
    tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
  }
});
addEventListener('resize', () => { if (graph) graph.width(innerWidth).height(innerHeight); });
document.getElementById('reset-btn').addEventListener('click', () => {
  closeDetail();
  if (graph) graph.cameraPosition({ x: 0, y: 0, z: 500 }, { x:0, y:0, z:0 }, 1200);
});
document.getElementById('close-detail').addEventListener('click', closeDetail);

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
async function boot() {
  const raw = await loadData();
  const data = filterData(raw);
  build(data);
  setupScene();
  setupZoom();

  document.getElementById('status-text').textContent =
    `${data.nodes.filter(n=>n.type==='domain').length} domains online`;

  setTimeout(() => {
    document.getElementById('loading').classList.add('done');
    setTimeout(() => document.getElementById('loading').remove(), 1100);
  }, 1000);
}

boot();
