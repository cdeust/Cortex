<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="750" height="320" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Transactive Memory System (Wegner 1987)</text>

  <!-- Agent boxes -->
  <rect x="40" y="55" width="140" height="65" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="110" y="78" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Engineer</text>
  <text x="110" y="95" text-anchor="middle" fill="#64748b" font-size="9">topic: engineer</text>
  <text x="110" y="108" text-anchor="middle" fill="#64748b" font-size="9">bugs, implementations</text>

  <rect x="220" y="55" width="140" height="65" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="290" y="78" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Tester</text>
  <text x="290" y="95" text-anchor="middle" fill="#64748b" font-size="9">topic: tester</text>
  <text x="290" y="108" text-anchor="middle" fill="#64748b" font-size="9">coverage, results</text>

  <rect x="400" y="55" width="140" height="65" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="470" y="78" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">Reviewer</text>
  <text x="470" y="95" text-anchor="middle" fill="#64748b" font-size="9">topic: reviewer</text>
  <text x="470" y="108" text-anchor="middle" fill="#64748b" font-size="9">patterns, violations</text>

  <rect x="580" y="55" width="140" height="65" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="650" y="78" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">Researcher</text>
  <text x="650" y="95" text-anchor="middle" fill="#64748b" font-size="9">topic: researcher</text>
  <text x="650" y="108" text-anchor="middle" fill="#64748b" font-size="9">papers, benchmarks</text>

  <!-- Arrows down -->
  <line x1="110" y1="120" x2="110" y2="155" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="120" x2="290" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="120" x2="470" y2="155" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="120" x2="650" y2="155" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PostgreSQL box -->
  <rect x="40" y="160" width="680" height="145" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="185" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Cortex Memory (PostgreSQL + pgvector)</text>

  <!-- Three layers -->
  <rect x="60" y="200" width="200" height="40" rx="6" fill="#172554" stroke="#1e40af" stroke-width="1"/>
  <text x="160" y="218" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="500">Specialization</text>
  <text x="160" y="232" text-anchor="middle" fill="#64748b" font-size="9">agent_topic scoping</text>

  <rect x="275" y="200" width="200" height="40" rx="6" fill="#1a2e05" stroke="#166534" stroke-width="1"/>
  <text x="375" y="218" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="500">Coordination</text>
  <text x="375" y="232" text-anchor="middle" fill="#64748b" font-size="9">decisions auto-propagate (is_global)</text>

  <rect x="490" y="200" width="210" height="40" rx="6" fill="#2a1a00" stroke="#92400e" stroke-width="1"/>
  <text x="595" y="218" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="500">Directory</text>
  <text x="595" y="232" text-anchor="middle" fill="#64748b" font-size="9">entity graph spans all topics</text>

  <!-- Bottom label -->
  <text x="375" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">Decisions detected via regex (engineering heuristic) and auto-protected (McGaugh 2004)</text>
  <text x="375" y="290" text-anchor="middle" fill="#94a3b8" font-size="10">Protected memories propagate to team scope for cross-agent visibility</text>
</svg>
